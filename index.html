<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Festas Contagem - Aluguel de Brinquedos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <header>
        <h1>📍 Portal Festas Contagem</h1>
        <p>Encontre o brinquedo perfeito para sua festa!</p>
    </header>

    <section class="busca">
        <h3>Qual a data da sua festa?</h3>
        <input type="date" id="filtro-data">
        <button onclick="buscarDisponiveis()">Buscar Brinquedos</button>
    </section>

    <main id="lista-brinquedos">
        <p class="aviso">Selecione uma data para ver o que temos disponível.</p>
    </main>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
